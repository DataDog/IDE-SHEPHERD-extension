name: Publish to VS Marketplace

on:
  workflow_run:
    workflows: ['Package Extension']
    types: [completed]

jobs:
  publish:
    name: Publish to VS Marketplace
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Download VSIX from release
        id: download
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          VERSION="${TAG#v}"
          VSIX="ide-shepherd-extension-${VERSION}.vsix"
          gh release download "$TAG" --pattern "*.vsix" --repo "${{ github.repository }}"
          echo "vsix_name=$VSIX" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install vsce
        run: npm install -g @vscode/vsce@3.9.1

      - name: Publish to Visual Studio Marketplace
        run: vsce publish --pat "$VSCE_TOKEN" --packagePath "${{ steps.download.outputs.vsix_name }}"
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
