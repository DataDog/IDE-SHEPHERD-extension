name: Package Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install vsce
        run: npm install -g @vscode/vsce@3.9.1

      - name: Validate extension manifest
        run: vsce ls

      - name: Package extension
        id: package
        run: |
          VERSION=$(jq -r '.version' package.json)
          VSIX="ide-shepherd-extension-${VERSION}.vsix"
          vsce package --no-dependencies --out "$VSIX"
          echo "vsix_name=$VSIX" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: ide-shepherd-extension-*.vsix
          retention-days: 7
