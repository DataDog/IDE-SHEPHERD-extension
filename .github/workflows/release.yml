name: Release

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  # ── Build, package, and cut a GitHub release ───────────────────────────────
  package-and-release:
    name: Package and Release
    runs-on: ubuntu-latest

    outputs:
      version_bumped: ${{ steps.version-check.outputs.version_bumped }}
      new_version: ${{ steps.version-check.outputs.new_version }}
      vsix_name: ${{ steps.locate-vsix.outputs.vsix_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Check if version was bumped
        id: version-check
        run: |
          CURRENT_VERSION=$(jq -r '.version' package.json)
          PREVIOUS_VERSION=$(git show HEAD~1:package.json | jq -r '.version' 2>/dev/null || echo "0.0.0")
          echo "Current version: $CURRENT_VERSION"
          echo "Previous version: $PREVIOUS_VERSION"

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "Version bumped from $PREVIOUS_VERSION to $CURRENT_VERSION"
            echo "version_bumped=true"  >> $GITHUB_OUTPUT
            echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "::warning::Version unchanged ($CURRENT_VERSION). Skipping release."
            echo "version_bumped=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.version-check.outputs.version_bumped == 'true'
        run: npm ci

      - name: Install vsce
        if: steps.version-check.outputs.version_bumped == 'true'
        run: npm install -g @vscode/vsce

      - name: Validate extension manifest
        if: steps.version-check.outputs.version_bumped == 'true'
        run: vsce ls

      - name: Package extension
        if: steps.version-check.outputs.version_bumped == 'true'
        run: vsce package --no-dependencies

      - name: Locate VSIX
        if: steps.version-check.outputs.version_bumped == 'true'
        id: locate-vsix
        run: |
          file=$(find . -maxdepth 1 -name '*.vsix' | head -1)
          echo "vsix_name=${file#./}" >> $GITHUB_OUTPUT

      - name: Upload VSIX as workflow artifact
        if: steps.version-check.outputs.version_bumped == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: ${{ steps.locate-vsix.outputs.vsix_name }}
          retention-days: 5

      - name: Extract changelog for this version
        if: steps.version-check.outputs.version_bumped == 'true'
        id: changelog
        run: |
          VERSION="${{ steps.version-check.outputs.new_version }}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Git tag
        if: steps.version-check.outputs.version_bumped == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag "v${{ steps.version-check.outputs.new_version }}"
          git push origin "v${{ steps.version-check.outputs.new_version }}"

      - name: Create GitHub Release and upload VSIX
        if: steps.version-check.outputs.version_bumped == 'true'
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.0.8
        with:
          tag_name: v${{ steps.version-check.outputs.new_version }}
          name: Release v${{ steps.version-check.outputs.new_version }}
          body: ${{ steps.changelog.outputs.notes }}
          files: ${{ steps.locate-vsix.outputs.vsix_name }}

  # ── Publish to Visual Studio Marketplace ───────────────────────────────────
  publish-marketplace:
    name: Publish to VS Marketplace
    runs-on: ubuntu-latest
    needs: package-and-release
    if: needs.package-and-release.outputs.version_bumped == 'true'

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Publish to Visual Studio Marketplace
        uses: HaaLeo/publish-vscode-extension@v1
        with:
          pat: ${{ secrets.VSCE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ needs.package-and-release.outputs.vsix_name }}

  # ── Publish to Open VSX Registry ───────────────────────────────────────────
  publish-openvsx:
    name: Publish to Open VSX
    runs-on: ubuntu-latest
    needs: package-and-release
    if: needs.package-and-release.outputs.version_bumped == 'true'
    # continue even if the marketplace publish job fails, so both registries
    # are attempted independently
    continue-on-error: true

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Publish to Open VSX Registry
        uses: HaaLeo/publish-vscode-extension@v1
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          extensionFile: ${{ needs.package-and-release.outputs.vsix_name }}
