name: Release

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  package-validation:
    name: Package and Release Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # Fetch full history for version comparison

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Check if version was bumped
        id: version-check
        run: |
          # Get current version from package.json
          CURRENT_VERSION=$(jq -r '.version' package.json)
          echo "Current version: $CURRENT_VERSION"

          # Get previous version from the last commit that changed package.json (excluding current commit)
          PREVIOUS_VERSION=$(git show HEAD~1:package.json | jq -r '.version' 2>/dev/null || echo "0.0.0")
          echo "Previous version: $PREVIOUS_VERSION"

          # Compare versions
          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "Version was bumped from $PREVIOUS_VERSION to $CURRENT_VERSION"
            echo "version_bumped=true" >> $GITHUB_OUTPUT
            echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "previous_version=$PREVIOUS_VERSION" >> $GITHUB_OUTPUT
          else
            echo "::warning::Version was not bumped in package.json (still $CURRENT_VERSION). Skipping release process."
            echo "version_bumped=false" >> $GITHUB_OUTPUT
            exit 0
          fi

      - name: Install dependencies
        if: steps.version-check.outputs.version_bumped == 'true'
        run: npm ci

      - name: Install vsce
        if: steps.version-check.outputs.version_bumped == 'true'
        run: npm install -g @vscode/vsce

      - name: Validate extension manifest
        if: steps.version-check.outputs.version_bumped == 'true'
        run: |
          vsce ls
          echo "Extension manifest validated successfully"

      - name: Package extension
        if: steps.version-check.outputs.version_bumped == 'true'
        run: vsce package --no-dependencies

      - name: Create Git tag
        if: steps.version-check.outputs.version_bumped == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag "v${{ steps.version-check.outputs.new_version }}"
          git push origin "v${{ steps.version-check.outputs.new_version }}"

      - name: Create GitHub Release
        if: steps.version-check.outputs.version_bumped == 'true'
        uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e # v1.1.4
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: 'v${{ steps.version-check.outputs.new_version }}'
          release_name: 'Release v${{ steps.version-check.outputs.new_version }}'
          body: |
            ## What's Changed

            Version bumped from ${{ steps.version-check.outputs.previous_version }} to ${{ steps.version-check.outputs.new_version }}

            ## Installation

            Download the `.vsix` file from the assets below and install it in VS Code using:
            - Command Palette: `Extensions: Install from VSIX...`
            - Or drag and drop the file into the Extensions view
          draft: false
          prerelease: false

      - name: Upload Release Asset
        if: steps.version-check.outputs.version_bumped == 'true'
        uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5 # v1.0.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./ide-shepherd-extension-${{ steps.version-check.outputs.new_version }}.vsix
          asset_name: ide-shepherd-extension-${{ steps.version-check.outputs.new_version }}.vsix
          asset_content_type: application/zip
