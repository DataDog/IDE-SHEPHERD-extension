name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  package-validation:
    name: Package and Release Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Validate extension manifest
        run: |
          vsce ls
          echo "Extension manifest validated successfully"

      - name: Package extension
        run: vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-${{ github.sha }}
          path: '*.vsix'
          retention-days: 30
