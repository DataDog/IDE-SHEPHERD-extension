name: Publish to Open VSX

on:
  workflow_run:
    workflows: ['Package Extension']
    types: [completed]

jobs:
  publish:
    name: Publish to Open VSX
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Download VSIX from release
        id: download
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${TAG#v}"
          VSIX="ide-shepherd-extension-${VERSION}.vsix"
          gh release download "$TAG" --pattern "*.vsix" --repo "${{ github.repository }}"
          echo "vsix_name=$VSIX" >> $GITHUB_OUTPUT

      - name: Install ovsx
        run: npm install -g ovsx

      - name: Publish to Open VSX Registry
        run: ovsx publish "${{ steps.download.outputs.vsix_name }}" -p "$OPEN_VSX_TOKEN"
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
